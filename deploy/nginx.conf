# LadderStep Human Consulting — Nginx site config
# Install at /etc/nginx/sites-available/ladderstep, symlink into sites-enabled.
#
# HTTP-only on purpose — no domain yet. Once you have one, run:
#   sudo certbot --nginx -d yourdomain.com
# Certbot rewrites this file in place to add the HTTPS server block and the
# HTTP->HTTPS redirect. Don't hand-write the SSL block; let certbot do it.

server {
    listen 80;
    server_name _;   # replace with your domain once you have one

    client_max_body_size 15M;   # resume/document uploads (5MB/10MB + headroom)

    # React build — static files
    root /var/www/ladderstep/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA client-side routing fallback
    }

    # Backend API — same origin as the frontend, so no CORS dance in production
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
